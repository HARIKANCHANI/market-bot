name: Daily Market Update

on:
  # Run daily at 9 AM IST (3:30 AM UTC) - Before market opens
  # DISABLED: Uncomment schedule below to enable automatic daily runs
  # schedule:
  #   - cron: '30 3 * * 1-5'  # Monday to Friday

  # Manual trigger only (scheduled runs disabled)
  workflow_dispatch:

jobs:
  update-stocks:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure environment
        run: |
          echo "NOTION_TOKEN=${{ secrets.NOTION_TOKEN }}" >> .env
          echo "DATABASE_ID=${{ secrets.DATABASE_ID }}" >> .env
          echo "HF_TOKEN=${{ secrets.HF_TOKEN }}" >> .env
      
      - name: Run Market Bot Lite (Quick Update)
        run: |
          python src/bots/market_bot_lite.py
        timeout-minutes: 30
      
      - name: Check database health
        if: always()
        run: |
          python scripts/maintenance/check_database.py
      
      - name: Upload execution logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-update-logs-${{ github.run_number }}
          path: |
            logs/*.log
          retention-days: 30
